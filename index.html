<!DOCTYPE html>
<html>
	<head>
		<title>To Do List</title>
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
		<div id="wrapper">

			
			<div id="title">
				<h1>To-Do List</h1>

				<!-- The date will be dynamically changed after JavaScript is implemented -->
				<p>ENTER YOUR TASKS</p>
			</div>

			<!-- 
				List Items will be outputted here.
			-->
			<div id="list"></div>

			<!--
				User Input is gathered through a text input, and sent to the JavaScript
				by the press of the submit input.
			-->
			<div id="text-bar">
				<input type="text" name="task" id="input_field" />
				<input type="button" name="submit" id="submit_button" value="↥"/>
			</div>
		</div>

		<script type="module" src="js/text-bar.js"></script>
		<script type="module" src="js/list.js"></script>
	</body>
</html>
